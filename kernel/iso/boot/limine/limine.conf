# Limine boot config — grub-free counterpart of ../grub/grub.cfg.
# Boots the same Multiboot2 kernel image at /boot/khy-os.bin, unchanged.
# Syntax: Limine v8/v9 (limine.conf). Keep the provisioned Limine binary release
# (khyos-manifest.json toolchain.win32-x64.limine) pinned to this syntax version.
timeout: 0
default_entry: 1

/KHY OS
    protocol: multiboot2
    kernel_path: boot():/boot/khy-os.bin
