  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="2"/>
  <circle cx="100" cy="100" r="65" fill="#E31E24"/>
  
  <!-- 火焰图案 -->
  <path d="M 100 70 Q 90 85 90 95 Q 90 105 100 110 Q 110 105 110 95 Q 110 85 100 70 Z" fill="white"/>
  <path d="M 100 75 Q 95 85 95 92 Q 95 98 100 102 Q 105 98 105 92 Q 105 85 100 75 Z" fill="#E31E24"/>
  
