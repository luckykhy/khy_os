<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML模型测试 - KHY量化交易系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .status-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .status-card h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .model-item {
      padding: 15px;
      border-radius: 8px;
      background: #f8f9fa;
      border-left: 4px solid #ddd;
    }

    .model-item.trained {
      background: #d4edda;
      border-left-color: #28a745;
    }

    .model-item.untrained {
      background: #f8d7da;
      border-left-color: #dc3545;
    }

    .model-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }

    .model-status {
      font-size: 12px;
      color: #666;
    }

    .test-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .result-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .result-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .recommendation {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }

    .recommendation.buy {
      background: #d4edda;
      color: #155724;
    }

    .recommendation.sell {
      background: #f8d7da;
      color: #721c24;
    }

    .recommendation.hold {
      background: #fff3cd;
      color: #856404;
    }

    .summary {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      color: #333;
      line-height: 1.6;
    }

    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }

    .agent-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      border-left: 4px solid #667eea;
    }

    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .agent-name {
      font-weight: 600;
      color: #333;
    }

    .agent-score {
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .agent-analysis {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .key-findings {
      margin-top: 10px;
    }

    .key-findings-title {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }

    .finding-item {
      font-size: 12px;
      color: #666;
      padding: 4px 0;
      padding-left: 12px;
      position: relative;
    }

    .finding-item:before {
      content: '•';
      position: absolute;
      left: 0;
      color: #667eea;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
    }

    .quick-stocks {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .stock-tag {
      padding: 8px 16px;
      background: #f0f0f0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }

    .stock-tag:hover {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 ML智能体模型测试</h1>
      <p>测试训练好的机器学习模型进行股票分析</p>
    </div>

    <div class="status-card">
      <h2>📊 模型状态</h2>
      <div id="modelStatus">
        <div class="loading">
          <div class="spinner"></div>
          <p>正在检查模型状态...</p>
        </div>
      </div>
    </div>

    <div class="test-section">
      <h2>🧪 测试分析</h2>
      <div class="quick-stocks">
        <span style="color: #666; font-size: 14px;">快速选择:</span>
        <div class="stock-tag" onclick="selectStock('sh000300')">沪深300</div>
        <div class="stock-tag" onclick="selectStock('sh000001')">上证指数</div>
        <div class="stock-tag" onclick="selectStock('sz399001')">深证成指</div>
        <div class="stock-tag" onclick="selectStock('sh600519')">贵州茅台</div>
        <div class="stock-tag" onclick="selectStock('sh600036')">招商银行</div>
      </div>
      <div class="input-group">
        <input 
          type="text" 
          id="stockInput" 
          placeholder="输入股票代码 (如: sh000300, sh600519)" 
          value="sh000300"
        />
        <button onclick="testAnalysis()" id="analyzeBtn">开始分析</button>
      </div>
    </div>

    <div id="resultContainer"></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api/trading-agents';

    // 检查模型状态
    async function checkModelStatus() {
      try {
        const response = await fetch(`${API_BASE}/ml-status`);
        const data = await response.json();

        if (data.success) {
          const { modelStatus, trainedModels, totalModels, message } = data.data;
          
          let html = `
            <div style="margin-bottom: 15px;">
              <strong>${message}</strong>
              <span style="color: #666; margin-left: 10px;">(${trainedModels}/${totalModels})</span>
            </div>
            <div class="model-grid">
          `;

          const modelNames = {
            market_analyst: '市场分析师',
            technical_analyst: '技术分析师',
            fundamental_analyst: '基本面分析师',
            news_analyst: '新闻分析师',
            risk_analyst: '风险分析师',
            strategy_analyst: '策略分析师'
          };

          for (const [key, exists] of Object.entries(modelStatus)) {
            const className = exists ? 'trained' : 'untrained';
            const status = exists ? '✅ 已训练' : '❌ 未训练';
            html += `
              <div class="model-item ${className}">
                <div class="model-name">${modelNames[key] || key}</div>
                <div class="model-status">${status}</div>
              </div>
            `;
          }

          html += '</div>';

          if (trainedModels === 0) {
            html += `
              <div class="error" style="margin-top: 15px;">
                ⚠️ 未找到训练好的模型！请先运行训练脚本: .\\一键训练智能体.bat
              </div>
            `;
          }

          document.getElementById('modelStatus').innerHTML = html;
        }
      } catch (error) {
        document.getElementById('modelStatus').innerHTML = `
          <div class="error">
            ❌ 无法连接到后端服务，请确保后端已启动！<br>
            错误: ${error.message}
          </div>
        `;
      }
    }

    // 选择股票
    function selectStock(code) {
      document.getElementById('stockInput').value = code;
    }

    // 测试分析
    async function testAnalysis() {
      const stockCode = document.getElementById('stockInput').value.trim();
      
      if (!stockCode) {
        alert('请输入股票代码');
        return;
      }

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.textContent = '分析中...';

      document.getElementById('resultContainer').innerHTML = `
        <div class="result-card">
          <div class="loading">
            <div class="spinner"></div>
            <p>正在使用ML模型分析 ${stockCode}...</p>
          </div>
        </div>
      `;

      try {
        const response = await fetch(`${API_BASE}/analyze`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            symbol: stockCode,
            useML: true
          })
        });

        const result = await response.json();

        if (result.success) {
          displayResult(result.data, result.isMLPowered);
        } else {
          throw new Error(result.message || '分析失败');
        }
      } catch (error) {
        document.getElementById('resultContainer').innerHTML = `
          <div class="result-card">
            <div class="error">
              ❌ 分析失败: ${error.message}
            </div>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.textContent = '开始分析';
      }
    }

    // 显示结果
    function displayResult(data, isMLPowered) {
      const recommendationClass = data.recommendation === '买入' ? 'buy' : 
                                   data.recommendation === '卖出' ? 'sell' : 'hold';

      // 确保置信度在0-100之间
      const confidence = Math.min(Math.max(Math.round(data.confidence || 0), 0), 100);

      let html = `
        <div class="result-card">
          <div class="result-header">
            <div class="result-title">
              ${data.stockCode} 分析报告
              ${isMLPowered ? '<span style="color: #28a745; font-size: 14px; margin-left: 10px;">🤖 ML驱动</span>' : ''}
            </div>
            <div class="recommendation ${recommendationClass}">
              ${data.recommendation}
            </div>
          </div>

          <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div>
              <div style="color: #999; font-size: 12px;">置信度</div>
              <div style="font-size: 24px; font-weight: 600; color: #667eea;">${confidence}%</div>
            </div>
            <div>
              <div style="color: #999; font-size: 12px;">参与智能体</div>
              <div style="font-size: 24px; font-weight: 600; color: #667eea;">${data.agentResults.length}个</div>
            </div>
          </div>

          <div class="summary">
            ${data.summary}
          </div>

          <h3 style="margin-bottom: 15px; color: #333;">🤖 智能体分析详情</h3>
          <div class="agents-grid">
      `;

      data.agentResults.forEach(agent => {
        // 确保每个智能体的置信度也在0-100之间
        const agentConfidence = agent.confidence 
          ? Math.min(Math.max(Math.round(agent.confidence * 100), 0), 100)
          : 70;

        html += `
          <div class="agent-card">
            <div class="agent-header">
              <div class="agent-name">${agent.agentName}</div>
              <div class="agent-score">${agent.score}/10</div>
            </div>
            <div style="font-size: 12px; color: #999; margin-bottom: 8px;">
              置信度: ${agentConfidence}%
            </div>
            <div class="agent-analysis">${agent.analysis}</div>
            ${agent.keyFindings && agent.keyFindings.length > 0 ? `
              <div class="key-findings">
                <div class="key-findings-title">关键发现:</div>
                ${agent.keyFindings.map(finding => `
                  <div class="finding-item">${finding}</div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        `;
      });

      html += `
          </div>
        </div>
      `;

      document.getElementById('resultContainer').innerHTML = html;
    }

    // 页面加载时检查模型状态
    checkModelStatus();

    // 回车键触发分析
    document.getElementById('stockInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        testAnalysis();
      }
    });
  </script>
</body>
</html>
